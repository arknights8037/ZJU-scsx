server:
  port: 8081

spring:
  datasource:
    # 居民端同时使用商城表和社区服务表，默认连接包含全部表的 mall_db。
    # 部署到其他电脑时可以通过 DB_URL、DB_USERNAME、DB_PASSWORD 环境变量覆盖。
    url: ${DB_URL:jdbc:mysql://localhost:3306/mall_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      # 只执行带 IF NOT EXISTS 的增量建表脚本，不会删除原有业务数据。
      mode: always
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

app:
  upload-dir: ${MALL_UPLOAD_DIR:uploads}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: YTk3ZDRmMjM1YTg2YzQ5ZjEyMzQ1Njc4OTBiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eHl6
  expiration: 604800000
